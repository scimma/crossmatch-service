name: crossmatch

networks:
  internal:
    external: false

volumes:
  django-db: {}
  django-static: {}
  valkey-data: {}

services:
  antares-consumer:
    image: hub.ncsa.illinois.edu/crossmatch-service/alert-consumer:dev
    platform: linux/x86_64
    networks:
      - internal
    build:
      context: ../crossmatch
      dockerfile: ../docker/Dockerfile
      args:
        UID: "${USERID:-1000}"
    command: bash entrypoints/run_antares_ingest.sh
    environment:
      # Dev environment settings
      MAKE_MIGRATIONS: "${MAKE_MIGRATIONS:-false}"
      DJANGO_DEBUG: "${DJANGO_DEBUG:-true}"
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DEV_MODE: "${DEV_MODE:-true}" # Enable Django dev server instead of uvicorn
      # Django base configuration
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-password}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-test@example.com}"
      # Django database configuration
      DATABASE_HOST: "${DATABASE_HOST:-django-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
      DATABASE_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-password}"
      # Message broker configuration
      VALKEY_SERVICE: "${VALKEY_SERVICE:-redis}"
      VALKEY_PORT: "${VALKEY_PORT:-6379}"
      # Application configuration
      APP_ROOT_DIR: "${APP_ROOT_DIR:-/opt}"
      # ANTARES broker configuration
      ANTARES_API_KEY: "${ANTARES_API_KEY:-}"
      ANTARES_API_SECRET: "${ANTARES_API_SECRET:-}"
      ANTARES_TOPIC: "${ANTARES_TOPIC:-lsst_scimma_quality_transient}"
      ANTARES_GROUP_ID: "${ANTARES_GROUP_ID:-}"   # empty → settings.py generates timestamp-suffix
    volumes:
      - "django-static:${APP_ROOT_DIR:-/opt}/static"
      - ../crossmatch:/opt/crossmatch

  lasair-consumer:
    image: hub.ncsa.illinois.edu/crossmatch-service/alert-consumer:dev
    platform: linux/x86_64
    networks:
      - internal
    build:
      context: ../crossmatch
      dockerfile: ../docker/Dockerfile
      args:
        UID: "${USERID:-1000}"
    command: bash entrypoints/run_lasair_ingest.sh
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-true}"
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DEV_MODE: "${DEV_MODE:-true}"
      # Django base configuration
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-password}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-test@example.com}"
      # Django database configuration
      DATABASE_HOST: "${DATABASE_HOST:-django-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
      DATABASE_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-password}"
      VALKEY_SERVICE: "${VALKEY_SERVICE:-redis}"
      VALKEY_PORT: "${VALKEY_PORT:-6379}"
      APP_ROOT_DIR: "${APP_ROOT_DIR:-/opt}"
      # Lasair broker configuration
      LASAIR_KAFKA_SERVER: "${LASAIR_KAFKA_SERVER:-lasair-lsst-kafka.lsst.ac.uk:9092}"
      LASAIR_TOPIC: "${LASAIR_TOPIC:-lasair_366SCiMMA_reliability_moderate}"
      LASAIR_GROUP_ID: "${LASAIR_GROUP_ID:-}"   # empty → settings.py generates timestamp-suffix
    volumes:
      - ../crossmatch:/opt/crossmatch

  celery-worker:
    image: hub.ncsa.illinois.edu/crossmatch-service/celery:dev
    platform: linux/x86_64
    build:
      context: ../crossmatch
      dockerfile: ../docker/Dockerfile
      args:
        UID: "${USERID:-1000}"
    command: bash entrypoints/run_celery_worker.sh alerts
    restart: on-failure
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 2
      resources:
        reservations:
          cpus: '0.25'
          memory: 1G
        limits:
          cpus: "${CELERY_WORKER_LIMIT_CPUS:-4.0}"
          memory: ${CELERY_WORKER_LIMIT_MEMORY:-4G}
    environment:
      # Dev environment settings
      DJANGO_DEBUG: "${DJANGO_DEBUG:-true}"
      DEV_MODE: "${DEV_MODE:-true}" # Enable Django dev server instead of uvicorn
      CELERY_LOG_LEVEL: ${CELERY_LOG_LEVEL:-INFO}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
      # Django database configuration
      DATABASE_HOST: "${DATABASE_HOST:-django-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
      DATABASE_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-password}"
      # Message broker configuration
      VALKEY_SERVICE: "${VALKEY_SERVICE:-redis}"
      VALKEY_PORT: "${VALKEY_PORT:-6379}"
      # Application configuration
      APP_ROOT_DIR: "${APP_ROOT_DIR:-/opt}"
      # Batch crossmatch thresholds
      #CROSSMATCH_BATCH_MAX_WAIT_SECONDS: "${CROSSMATCH_BATCH_MAX_WAIT_SECONDS:-900}"
      CROSSMATCH_BATCH_MAX_WAIT_SECONDS: "${CROSSMATCH_BATCH_MAX_WAIT_SECONDS:-60}"
      CROSSMATCH_BATCH_MAX_SIZE: "${CROSSMATCH_BATCH_MAX_SIZE:-100000}"
      # LSDB crossmatch settings
      GAIA_HATS_URL: "${GAIA_HATS_URL:-s3://stpubdata/gaia/gaia_dr3/public/hats}"
      DES_HATS_URL: "${DES_HATS_URL:-https://data.lsdb.io/hats/des/des_y6_gold}"
      CROSSMATCH_RADIUS_ARCSEC: "${CROSSMATCH_RADIUS_ARCSEC:-1.0}"
      # Remote Dask scheduler (not used in local dev)
      # DASK_SCHEDULER_ADDRESS: "${DASK_SCHEDULER_ADDRESS:-}"
      # Hopskotch publisher configuration
      HOPSKOTCH_BROKER_URL: "${HOPSKOTCH_BROKER_URL:-kafka://kafka.scimma.org}"
      HOPSKOTCH_TOPIC: "${HOPSKOTCH_TOPIC:-}"
      HOPSKOTCH_USERNAME: "${HOPSKOTCH_USERNAME:-}"
      HOPSKOTCH_PASSWORD: "${HOPSKOTCH_PASSWORD:-}"
    volumes:
      - ../crossmatch:/opt/crossmatch

  celery-beat:
    restart: on-failure
    depends_on:
      valkey:
        condition: service_healthy
    image: hub.ncsa.illinois.edu/crossmatch-service/celery:dev
    build:
      context: ../crossmatch
      dockerfile: ../docker/Dockerfile
      args:
        UID: "${USERID:-1000}"
    command: bash entrypoints/run_celery_beat.sh
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-true}"
      DEV_MODE: "${DEV_MODE:-true}" # Enable Django dev server instead of uvicorn
      CELERY_LOG_LEVEL: ${CELERY_LOG_LEVEL:-INFO}
      # Django database configuration
      DATABASE_HOST: "${DATABASE_HOST:-django-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
      DATABASE_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-password}"
      # Message broker configuration
      VALKEY_SERVICE: "${VALKEY_SERVICE:-redis}"
      VALKEY_PORT: "${VALKEY_PORT:-6379}"
      # Batch crossmatch thresholds
      CROSSMATCH_BATCH_MAX_WAIT_SECONDS: "${CROSSMATCH_BATCH_MAX_WAIT_SECONDS:-900}"
      CROSSMATCH_BATCH_MAX_SIZE: "${CROSSMATCH_BATCH_MAX_SIZE:-100000}"
    networks:
      - internal
    volumes:
      - ../crossmatch:/opt/crossmatch

  flower:
    image: hub.ncsa.illinois.edu/crossmatch-service/celery:dev
    platform: linux/x86_64
    build:
      context: ../crossmatch
      dockerfile: ../docker/Dockerfile
      args:
        UID: "${USERID:-1000}"
    command: bash entrypoints/run_flower.sh
    networks:
      internal:
        aliases:
          - ${FLOWER_HOST:-flower}
    ports:
      - 127.0.0.1:${FLOWER_PORT:-8888}:${FLOWER_PORT:-8888}
    environment:
      # Message broker configuration
      VALKEY_SERVICE: "${VALKEY_SERVICE:-redis}"
      VALKEY_PORT: "${VALKEY_PORT:-6379}"
      # Flower configuration
      FLOWER_LOG_LEVEL: "${FLOWER_LOG_LEVEL:-INFO}"
      FLOWER_URL_PREFIX: "${FLOWER_URL_PREFIX:-}"
      FLOWER_HOST: "${FLOWER_HOST:-flower}"
      FLOWER_PORT: "${FLOWER_PORT:-8888}"
      # Django database configuration
      DATABASE_HOST: "${DATABASE_HOST:-django-db}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
      DATABASE_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-password}"

  django-db:
    image: postgres:18.3
    platform: linux/x86_64
    restart: always
    networks:
      internal:
        aliases:
          - ${DATABASE_HOST:-django-db}
    environment:
      POSTGRES_USER: "${DATABASE_USER:-crossmatch_service_admin}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:-password}"
      POSTGRES_DB: "${DATABASE_DB:-scimma_crossmatch_service}"
    volumes:
      - django-db:/var/lib/postgresql

  valkey:
    image: valkey/valkey:9.0.3
    command: [ "valkey-server", "/usr/local/etc/valkey/valkey.conf" ]
    ports:
      - 127.0.0.1:${VALKEY_PORT:-6379}:6379
    networks:
      internal:
        aliases:
          - "${VALKEY_SERVICE:-redis}"
    volumes:
      - valkey-data:/data
      - ./valkey:/usr/local/etc/valkey:ro
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli -p ${VALKEY_PORT:-6379} ping | grep PONG"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_interval: 5s
      start_period: 5s

  local-kafka:
    image: scimma/server:latest
    command: ["--noSecurity"]
    hostname: local-kafka
    profiles:
      - local-kafka
    networks:
      internal:
        aliases:
          - local-kafka
    ports:
      - 127.0.0.1:9092:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  local-kafka-init:
    image: scimma/server:latest
    profiles:
      - local-kafka
    depends_on:
      local-kafka:
        condition: service_healthy
    networks:
      - internal
    entrypoint: /usr/bin/kafka-topics
    command:
      - --bootstrap-server
      - local-kafka:9092
      - --create
      - --if-not-exists
      - --topic
      - ${HOPSKOTCH_TOPIC:-crossmatch-test}
      - --partitions
      - "1"
      - --replication-factor
      - "1"
    restart: "no"
