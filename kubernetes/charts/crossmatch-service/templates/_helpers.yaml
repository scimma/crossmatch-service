{{- define "common.env" -}}
- name: DEV_MODE
  value: "false"
- name: MAKE_MIGRATIONS
  value: "false"
- name: APP_ROOT_DIR
  value: {{ .Values.antares_consumer.app_root_dir }}
{{- end }}

{{- define "django.env" -}}
- name: LOG_LEVEL
  value: {{ .Values.antares_consumer.log_level | quote }}
- name: DJANGO_DEBUG
  value: {{ .Values.antares_consumer.django_debug | quote }}
- name: SECRET_KEY
  valueFrom:
    secretKeyRef:
      key: SECRET_KEY
      name: django
- name: DJANGO_SUPERUSER_PASSWORD
  valueFrom:
    secretKeyRef:
      key: DJANGO_SUPERUSER_PASSWORD
      name: django
- name: DJANGO_SUPERUSER_USERNAME
  value: admin
- name: DJANGO_SUPERUSER_EMAIL
  value: admin@localhost
{{- end }}

{{- define "celery.env" -}}
- name: TASK_TIME_LIMIT
  value: {{ .Values.celery.task_time_limit | quote }}
- name: TASK_SOFT_TIME_LIMIT
  value: {{ .Values.celery.task_soft_time_limit | quote }}
- name: DASK_SCHEDULER_ADDRESS
  value: {{ .Values.celery.dask_scheduler_address | default "" | quote }}
{{- end }}

{{- define "db.env" -}}
- name: DATABASE_HOST
  value: {{ .Values.database.clusterName }}-rw
- name: DATABASE_PORT
  value: {{ .Values.database.port | quote }}
- name: DATABASE_USER
  value: {{ .Values.database.initdb.username | quote }}
- name: DATABASE_DB
  value: {{ .Values.database.initdb.database | quote }}
- name: DATABASE_PASSWORD
  valueFrom:
    secretKeyRef:
      key: password
      name: {{ .Values.database.initdb.existingSecret | quote }}
- name: POSTGRES_USER
  value: {{ .Values.database.initdb.username | quote }}
- name: POSTGRES_DB
  value: {{ .Values.database.initdb.database | quote }}
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      key: password
      name: {{ .Values.database.initdb.existingSecret | quote }}
{{- end }}

{{- define "valkey.env" -}}
- name: VALKEY_SERVICE
  value: {{ .Values.valkey.fullnameOverride | default "redis" }}
- name: VALKEY_PORT
  value: "6379"
{{- end }}

{{- define "antares.env" -}}
- name: ANTARES_API_KEY
  valueFrom:
    secretKeyRef:
      key: ANTARES_API_KEY
      name: antares
- name: ANTARES_API_SECRET
  valueFrom:
    secretKeyRef:
      key: ANTARES_API_SECRET
      name: antares
- name: ANTARES_TOPIC
  value: {{ .Values.antares_consumer.topic | quote }}
- name: ANTARES_GROUP_ID
  value: {{ .Values.antares_consumer.group_id | quote }}
{{- end }}

{{- define "hopskotch.env" -}}
- name: HOPSKOTCH_BROKER_URL
  value: {{ .Values.hopskotch.broker_url | quote }}
- name: HOPSKOTCH_TOPIC
  value: {{ .Values.hopskotch.topic | quote }}
- name: HOPSKOTCH_USERNAME
  valueFrom:
    secretKeyRef:
      key: HOPSKOTCH_USERNAME
      name: hopskotch
- name: HOPSKOTCH_PASSWORD
  valueFrom:
    secretKeyRef:
      key: HOPSKOTCH_PASSWORD
      name: hopskotch
{{- end }}

{{- define "crossmatch.env" -}}
- name: GAIA_HATS_URL
  value: {{ .Values.crossmatch.gaia_hats_url | quote }}
- name: DES_HATS_URL
  value: {{ .Values.crossmatch.des_hats_url | quote }}
- name: CROSSMATCH_RADIUS_ARCSEC
  value: {{ .Values.crossmatch.radius_arcsec | quote }}
- name: CROSSMATCH_BATCH_MAX_WAIT_SECONDS
  value: {{ .Values.crossmatch.batch_max_wait_seconds | quote }}
- name: CROSSMATCH_BATCH_MAX_SIZE
  value: {{ .Values.crossmatch.batch_max_size | quote }}
{{- end }}

{{- define "flower.env" -}}
- name: FLOWER_URL_PREFIX
  value: {{ .Values.flower.ingress.basePath | quote }}
- name: FLOWER_PORT
  value: {{ .Values.flower.port | quote }}
- name: FLOWER_UNAUTHENTICATED_API
  value: {{ .Values.flower.flower_unauthenticated_api | quote }}
{{- end }}
